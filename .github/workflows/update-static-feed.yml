name: Update Static Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write

concurrency:
  group: update-static-feed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Data
        env:
          STATIC_MAX_AGE_DAYS: "30"
          STATIC_REFRESH_RECENT_COUNT: "40"
          STATIC_CONCURRENCY: "5"
          SOURCE_FETCH_CONCURRENCY: "4"
          SUBSTACK_PROXY_FALLBACK_ENABLED: "1"
          RSS2JSON_API_KEY: ${{ secrets.RSS2JSON_API_KEY }}
        run: npm run build:data

      - name: Commit & Push Data Updates
        run: |
          if [[ -z "$(git status --porcelain public/data)" ]]; then
            echo "No feed data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore: refresh static feed data"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
