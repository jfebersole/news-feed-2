<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEWS FEED</title>
    <link rel="icon" type="image/svg+xml" sizes="any" href="./favicon.svg?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600&family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&display=swap"
      rel="stylesheet"
    /> -->
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600&family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Oswald:wght@400;500&family=Rajdhani:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="masthead">
        <div class="brand-block">
          <span class="header-logo" aria-hidden="true">
            <svg viewBox="0 0 100 100" role="img" focusable="false">
              <path d="M0 5H95V100" />
              <path d="M0 25H75V100" />
              <path d="M0 45H55V100" />
              <path d="M0 65H35V100" />
              <rect x="0" y="80" width="20" height="20" />
            </svg>
          </span>
          <div class="brand-copy">
            <p class="issue-kicker">Loading date...</p>
            <h1>
              <a href="#" id="homeLink" class="home-link" title="Refresh feed">NEWS FEED</a>
            </h1>
          </div>
          <div id="metaStrip" class="meta-strip"></div>
        </div>
      </header>

      <section class="main-grid">
        <aside class="control-rail" aria-label="Feed tools">
          <div class="control-rail-inner">
            <button id="weatherTicket" class="weather-ticket" type="button" hidden>
              <span class="weather-ticket-topline">
                <span class="weather-ticket-label">DC</span>
                <span id="weatherScore" class="weather-ticket-score"></span>
              </span>
              <span id="weatherHeadline" class="weather-ticket-headline"></span>
              <span class="weather-ticket-cta">Forecast <span aria-hidden="true">→</span></span>
            </button>

            <button
              id="sourcePickerToggle"
              class="source-picker-toggle"
              type="button"
              aria-expanded="false"
              aria-controls="sourcePicker"
            >
              <span class="source-picker-toggle-kicker">Sources</span>
              <span class="source-picker-toggle-selection">
                <span id="sourcePickerValue">All sources</span>
                <span id="sourcePickerCount" class="source-picker-toggle-count"></span>
              </span>
              <span class="source-picker-toggle-arrow" aria-hidden="true">↓</span>
            </button>

            <label class="search-box" for="searchInput">
              <span>Search stories</span>
              <input id="searchInput" type="search" placeholder="Search" />
            </label>
          </div>

          <button
            id="sourcePickerBackdrop"
            class="source-picker-backdrop"
            type="button"
            aria-label="Close source picker"
            hidden
          ></button>
          <section id="sourcePicker" class="source-picker" aria-label="Choose a source" hidden>
            <div class="source-picker-header">
              <div>
                <p class="source-picker-kicker">Feed index</p>
                <h2>Choose a source</h2>
              </div>
              <button id="sourcePickerClose" class="source-picker-close" type="button">Close</button>
            </div>
            <div id="sourceChips" class="source-chips" aria-label="Source filters"></div>
          </section>
        </aside>

        <section class="story-panel">
          <section id="cardGrid" class="card-grid" aria-live="polite"></section>
          <article id="readerPanel" class="reader-panel" aria-live="polite" hidden>
            <div class="reader-sticky">
              <div class="reader-rail">
                <p id="readerRailTitle" class="reader-rail-title"></p>
                <div class="reader-rail-actions">
                  <span id="readerRailSource" class="reader-source"></span>
                  <a
                    id="readerRailLink"
                    class="reader-access reader-link"
                    href="#"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    Original
                  </a>
                </div>
              </div>
            </div>
            <div class="reader-content">
              <h2 id="readerTitle" class="reader-title"></h2>
              <p id="readerSubtitle" class="reader-subtitle"></p>
              <div id="readerBylineRow" class="reader-byline-row">
                <p id="readerMeta" class="reader-meta"></p>
                <div class="reader-byline-actions">
                  <span id="readerSource" class="reader-source"></span>
                  <a
                    id="readerLink"
                    class="reader-access reader-link"
                    href="#"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    Original
                  </a>
                </div>
              </div>
              <p id="readerReason" class="reader-reason"></p>
              <div id="readerBody" class="reader-body"></div>
            </div>
          </article>
        </section>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="feed-card">
        <div class="card-topline">
          <span class="rank-pill"></span>
          <span class="source-pill"></span>
          <span class="time-pill"></span>
          <span class="card-access-indicator" hidden>
            <svg viewBox="0 0 16 18" focusable="false" aria-hidden="true">
              <path d="M4.25 7V5.25a3.75 3.75 0 0 1 7.5 0V7" />
              <rect x="2.25" y="7" width="11.5" height="8.75" rx="1.25" />
              <path d="M8 10.25v2.5" />
            </svg>
          </span>
        </div>
        <a class="card-title-link" href="#" target="_blank" rel="noopener noreferrer">
          <h2 class="card-title"></h2>
        </a>
        <p class="card-summary"></p>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
