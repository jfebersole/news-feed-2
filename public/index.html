<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEWS FEED</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600&family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&display=swap"
      rel="stylesheet"
    /> -->
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600&family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Oswald:wght@400;500&family=Rajdhani:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="masthead">
        <div class="brand-block">
          <span class="header-logo" aria-hidden="true">
            <svg viewBox="0 0 100 100" role="img" focusable="false">
              <path d="M0 5H95V100" />
              <path d="M0 25H75V100" />
              <path d="M0 45H55V100" />
              <path d="M0 65H35V100" />
              <rect x="0" y="80" width="20" height="20" />
            </svg>
          </span>
          <div class="brand-copy">
            <p class="issue-kicker">Issue 01 · Daily Build</p>
            <h1>
              <a href="#" id="homeLink" class="home-link">NEWS FEED</a>
            </h1>
          </div>
        </div>
        <div class="masthead-controls">
          <button id="refreshBtn" class="refresh-btn" type="button">Refresh</button>
          <span id="lastUpdated" class="last-updated">Loading...</span>
        </div>
      </header>

      <section class="main-grid">
        <section class="story-panel">
          <div id="metaStrip" class="meta-strip"></div>
          <section id="cardGrid" class="card-grid" aria-live="polite"></section>
          <article id="readerPanel" class="reader-panel" aria-live="polite" hidden>
            <div class="reader-sticky">
              <div class="reader-rail">
                <p id="readerRailTitle" class="reader-rail-title"></p>
                <div class="reader-rail-actions">
                  <span id="readerRailSource" class="reader-source"></span>
                  <a
                    id="readerRailLink"
                    class="reader-access reader-link"
                    href="#"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    Link
                  </a>
                </div>
              </div>
            </div>
            <div class="reader-content">
              <h2 id="readerTitle" class="reader-title"></h2>
              <p id="readerSubtitle" class="reader-subtitle"></p>
              <div id="readerBylineRow" class="reader-byline-row">
                <p id="readerMeta" class="reader-meta"></p>
                <div class="reader-byline-actions">
                  <span id="readerSource" class="reader-source"></span>
                  <a
                    id="readerLink"
                    class="reader-access reader-link"
                    href="#"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    Link
                  </a>
                </div>
              </div>
              <p id="readerReason" class="reader-reason"></p>
              <div id="readerBody" class="reader-body"></div>
            </div>
          </article>
        </section>

        <aside class="control-rail">
          <label class="search-box" for="searchInput">
            <span>Search</span>
            <input id="searchInput" type="search" placeholder="Title, source, keyword" />
          </label>
          <div id="sourceChips" class="source-chips" aria-label="Source filters"></div>
        </aside>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="feed-card">
        <div class="card-topline">
          <span class="rank-pill"></span>
          <span class="source-pill"></span>
          <span class="time-pill"></span>
        </div>
        <a class="card-title-link" href="#" target="_blank" rel="noopener noreferrer">
          <h2 class="card-title"></h2>
        </a>
        <p class="card-summary"></p>
        <div class="card-footer">
          <a class="card-link" target="_blank" rel="noopener noreferrer">Open Story</a>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
